name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify Gradle Wrapper permissions
        if: runner.os != 'Windows'
        shell: bash
        run: test -x ./gradlew
      - name: Build and test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./gradlew clean check shadowJar
      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat clean check shadowJar
      - name: Upload runnable Jar
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: wMatcher
          path: wmatcher-app/build/libs/wMatcher-*-all.jar
          if-no-files-found: error
